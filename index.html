<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#667eea">
  <title>IronWork - Secure Work Tracking</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #f8f9fa;
      color: #333;
    }
    button { font-family: inherit; }
    input, select, textarea { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.10.3/dist/Recharts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/appwrite@16.0.2"></script>

  <script>
    const { useState, useEffect } = React;
    const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

    // YOUR APPWRITE CONFIGURATION - EXACT IDs
    const APPWRITE_ENDPOINT = 'https://cloud.appwrite.io/v1';
    const APPWRITE_PROJECT_ID = localStorage.getItem('appwrite_project_id') || '';
    const DATABASE_ID = '69e95a44001bdc4c7e8e';  // YOUR DATABASE ID
    const PROJECTS_COLLECTION_ID = 'projects';
    const ENTRIES_COLLECTION_ID = 'entries';

    let client, account, databases;

    const initAppwrite = (projectId) => {
      client = new Appwrite.Client()
        .setEndpoint(APPWRITE_ENDPOINT)
        .setProject(projectId);
      
      account = new Appwrite.Account(client);
      databases = new Appwrite.Databases(client);
    };

    const IronworkApp = () => {
      const [user, setUser] = useState(null);
      const [screen, setScreen] = useState('setup');
      const [projects, setProjects] = useState([]);
      const [entries, setEntries] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [projectId, setProjectId] = useState(APPWRITE_PROJECT_ID);

      useEffect(() => {
        if (APPWRITE_PROJECT_ID) {
          initAppwrite(APPWRITE_PROJECT_ID);
          checkSession();
        }
      }, []);

      const checkSession = async () => {
        try {
          const session = await account.get();
          setUser(session);
          setScreen('dashboard');
        } catch (e) {
          setScreen('login');
        }
      };

      const handleSetup = () => {
        if (projectId) {
          localStorage.setItem('appwrite_project_id', projectId);
          initAppwrite(projectId);
          setScreen('login');
        }
      };

      const auth = {
        signup: async (email, password, name) => {
          try {
            await account.create('unique()', email, password, name);
            return await auth.login(email, password);
          } catch (e) {
            throw new Error(e.message || 'Signup failed');
          }
        },
        login: async (email, password) => {
          try {
            await account.createEmailPasswordSession(email, password);
            const user = await account.get();
            return user;
          } catch (e) {
            throw new Error(e.message || 'Login failed');
          }
        },
        logout: async () => {
          try {
            await account.deleteSession('current');
            setUser(null);
            setScreen('login');
          } catch (e) {
            console.error(e);
          }
        }
      };

      const api = {
        getProjects: async () => {
          try {
            const response = await databases.listDocuments(
              DATABASE_ID,
              PROJECTS_COLLECTION_ID,
              [
                Appwrite.Query.equal('user_id', user.$id)
              ]
            );
            setProjects(response.documents);
          } catch (e) {
            console.error('Get projects error:', e);
          }
        },
        getEntries: async () => {
          try {
            const response = await databases.listDocuments(
              DATABASE_ID,
              ENTRIES_COLLECTION_ID,
              [
                Appwrite.Query.equal('user_id', user.$id),
                Appwrite.Query.orderDesc('date'),
                Appwrite.Query.limit(100)
              ]
            );
            setEntries(response.documents);
          } catch (e) {
            console.error('Get entries error:', e);
          }
        },
        addProject: async (project) => {
          try {
            const rate = project.paymentType === 'Per Day'
              ? (parseFloat(project.salary) / parseFloat(project.workingDays || 30))
              : parseFloat(project.salary);

            await databases.createDocument(
              DATABASE_ID,
              PROJECTS_COLLECTION_ID,
              'unique()',
              {
                user_id: user.$id,
                name: project.name,
                paymentType: project.paymentType,
                salary: parseFloat(project.salary),
                workingDays: parseFloat(project.workingDays || 30),
                targetHours: parseFloat(project.targetHours || 0),
                rate: rate,
                active: true,
              }
            );
            await api.getProjects();
          } catch (e) {
            console.error('Add project error:', e);
            alert('Failed to add project: ' + e.message);
          }
        },
        updateProject: async (projectId, project) => {
          try {
            const rate = project.paymentType === 'Per Day'
              ? (parseFloat(project.salary) / parseFloat(project.workingDays || 30))
              : parseFloat(project.salary);

            await databases.updateDocument(
              DATABASE_ID,
              PROJECTS_COLLECTION_ID,
              projectId,
              {
                name: project.name,
                paymentType: project.paymentType,
                salary: parseFloat(project.salary),
                workingDays: parseFloat(project.workingDays || 30),
                targetHours: parseFloat(project.targetHours || 0),
                rate: rate,
              }
            );
            await api.getProjects();
          } catch (e) {
            console.error('Update project error:', e);
            alert('Failed to update project: ' + e.message);
          }
        },
        deleteProject: async (projectId) => {
          try {
            await databases.deleteDocument(DATABASE_ID, PROJECTS_COLLECTION_ID, projectId);
            await api.getProjects();
          } catch (e) {
            console.error('Delete project error:', e);
          }
        },
        addEntry: async (entry) => {
          try {
            let hours = 0;
            if (!entry.isHoliday && entry.startTime && entry.endTime) {
              const [sh, sm] = entry.startTime.split(':').map(Number);
              const [eh, em] = entry.endTime.split(':').map(Number);
              hours = (eh + em/60) - (sh + sm/60);
              if (hours < 0) hours += 24;
            }

            const project = projects.find(p => p.$id === entry.project_id);
            let earnings = 0;
            if (project) {
              if (entry.isHoliday) {
                earnings = project.rate;
              } else if (project.paymentType === 'Per Day') {
                earnings = project.rate;
              } else {
                earnings = hours * project.rate;
              }
            }

            await databases.createDocument(
              DATABASE_ID,
              ENTRIES_COLLECTION_ID,
              'unique()',
              {
                user_id: user.$id,
                project_id: entry.project_id,
                date: entry.date,
                startTime: entry.startTime || '',
                endTime: entry.endTime || '',
                isHoliday: entry.isHoliday,
                hours: hours,
                earnings: earnings,
                notes: entry.notes || '',
              }
            );
            await api.getEntries();
          } catch (e) {
            console.error('Add entry error:', e);
            alert('Failed to add entry: ' + e.message);
          }
        },
        deleteEntry: async (entryId) => {
          try {
            await databases.deleteDocument(DATABASE_ID, ENTRIES_COLLECTION_ID, entryId);
            await api.getEntries();
          } catch (e) {
            console.error('Delete entry error:', e);
          }
        },
      };

      useEffect(() => {
        if (user && screen === 'dashboard') {
          api.getProjects();
          api.getEntries();
        }
      }, [screen, user]);

      const handleLogin = async (email, password) => {
        setLoading(true);
        setError('');
        try {
          const userData = await auth.login(email, password);
          setUser(userData);
          setScreen('dashboard');
        } catch (e) {
          setError(e.message);
        }
        setLoading(false);
      };

      const handleSignup = async (email, password, name) => {
        setLoading(true);
        setError('');
        try {
          const userData = await auth.signup(email, password, name);
          setUser(userData);
          setScreen('dashboard');
        } catch (e) {
          setError(e.message);
        }
        setLoading(false);
      };

      const calculateStats = () => {
        let totalEarnings = 0;
        let totalHours = 0;
        const projectStats = {};
        const monthlyData = {};

        entries.forEach(entry => {
          const date = new Date(entry.date);
          const monthKey = date.toLocaleString('default', { month: 'short', year: 'numeric' });

          totalEarnings += entry.earnings || 0;
          totalHours += entry.hours || 0;

          const project = projects.find(p => p.$id === entry.project_id);
          const projectName = project?.name || 'Unknown';

          if (!projectStats[projectName]) {
            projectStats[projectName] = { earnings: 0, hours: 0, days: 0, project };
          }
          projectStats[projectName].earnings += entry.earnings || 0;
          projectStats[projectName].hours += entry.hours || 0;
          if (entry.earnings > 0) projectStats[projectName].days += 1;

          if (!monthlyData[monthKey]) {
            monthlyData[monthKey] = { earnings: 0, hours: 0, days: 0 };
          }
          monthlyData[monthKey].earnings += entry.earnings || 0;
          monthlyData[monthKey].hours += entry.hours || 0;
          if (entry.earnings > 0) monthlyData[monthKey].days += 1;
        });

        return { totalEarnings, totalHours, projectStats, monthlyData };
      };

      if (!APPWRITE_PROJECT_ID || screen === 'setup') {
        return React.createElement(SetupScreen, { 
          projectId, setProjectId, 
          onSetup: handleSetup, 
          error 
        });
      }

      if (!user || screen === 'login') {
        return React.createElement(LoginScreen, { 
          onLogin: handleLogin, 
          onSignup: handleSignup, 
          loading, 
          error, 
          setError 
        });
      }

      const stats = calculateStats();

      if (screen === 'dashboard') {
        return React.createElement(DashboardScreen, {
          stats, projects, entries, user,
          onLogout: () => auth.logout(),
          onAddEntry: () => setScreen('addEntry'),
          onAddProject: () => setScreen('addProject'),
          onEditProject: (p) => { setScreen('editProject'); window.editingProject = p; },
          onDeleteProject: (id) => api.deleteProject(id),
          onDeleteEntry: (id) => api.deleteEntry(id),
          onExport: () => setScreen('export')
        });
      }

      if (screen === 'addEntry') {
        return React.createElement(AddEntryScreen, {
          projects,
          onSubmit: async (e) => { await api.addEntry(e); setScreen('dashboard'); },
          onBack: () => setScreen('dashboard')
        });
      }

      if (screen === 'addProject') {
        return React.createElement(AddProjectScreen, {
          onSubmit: async (p) => { await api.addProject(p); setScreen('dashboard'); },
          onBack: () => setScreen('dashboard')
        });
      }

      if (screen === 'editProject') {
        return React.createElement(EditProjectScreen, {
          project: window.editingProject,
          onSubmit: async (p) => { await api.updateProject(window.editingProject.$id, p); setScreen('dashboard'); },
          onBack: () => setScreen('dashboard')
        });
      }

      if (screen === 'export') {
        return React.createElement(ExportScreen, {
          stats, entries, projects,
          onBack: () => setScreen('dashboard')
        });
      }
    };

    // Setup Screen
    const SetupScreen = ({ projectId, setProjectId, onSetup, error }) => {
      return React.createElement('div', { style: { minHeight: '100vh', background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px' } },
        React.createElement('div', { style: { background: 'white', borderRadius: '16px', padding: '40px', maxWidth: '500px', width: '100%' } },
          React.createElement('h1', { style: { fontSize: '28px', fontWeight: 'bold', marginBottom: '10px', textAlign: 'center' } }, 'IronWork Setup'),
          React.createElement('p', { style: { fontSize: '14px', color: '#666', textAlign: 'center', marginBottom: '30px' } }, 'Enter your Appwrite Project ID'),
          React.createElement('div', { style: { background: '#f0f8ff', padding: '15px', borderRadius: '8px', marginBottom: '20px', fontSize: '13px' } },
            React.createElement('div', { style: { fontWeight: 'bold', marginBottom: '5px' } }, '🔒 SOC 2 Certified Security'),
            React.createElement('div', null, '✓ Enterprise-grade encryption'),
            React.createElement('div', null, '✓ HIPAA & GDPR compliant'),
            React.createElement('div', null, '✓ Your data is 100% secure')
          ),
          React.createElement('div', { style: { marginBottom: '20px' } },
            React.createElement('label', { style: { display: 'block', marginBottom: '8px', fontWeight: 'bold', fontSize: '14px' } }, 'Appwrite Project ID'),
            React.createElement('input', { 
              type: 'text', 
              placeholder: 'Paste your Project ID here', 
              value: projectId, 
              onChange: (e) => setProjectId(e.target.value),
              style: { width: '100%', padding: '12px', border: '2px solid #e0e0e0', borderRadius: '8px', fontSize: '14px', boxSizing: 'border-box', fontFamily: 'monospace' }
            })
          ),
          error && React.createElement('div', { style: { background: '#ffe0e0', color: '#d32f2f', padding: '12px', borderRadius: '6px', marginBottom: '15px', fontSize: '13px' } }, error),
          React.createElement('button', { 
            onClick: onSetup,
            style: { width: '100%', padding: '12px', background: '#667eea', color: 'white', border: 'none', borderRadius: '8px', fontSize: '16px', fontWeight: 'bold', cursor: 'pointer' }
          }, 'Connect to Appwrite'),
          React.createElement('div', { style: { marginTop: '20px', fontSize: '12px', color: '#666', textAlign: 'center' } },
            'Find your Project ID in ',
            React.createElement('a', { href: 'https://cloud.appwrite.io', target: '_blank', style: { color: '#667eea' } }, 'Appwrite Console'),
            ' → Settings'
          )
        )
      );
    };

    // Login Screen
    const LoginScreen = ({ onLogin, onSignup, loading, error, setError }) => {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [name, setName] = useState('');
      const [isSignup, setIsSignup] = useState(false);

      return React.createElement('div', { style: { minHeight: '100vh', background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px' } },
        React.createElement('div', { style: { background: 'white', borderRadius: '16px', padding: '40px', maxWidth: '400px', width: '100%' } },
          React.createElement('h1', { style: { fontSize: '28px', fontWeight: 'bold', marginBottom: '10px', textAlign: 'center' } }, 'IronWork'),
          React.createElement('p', { style: { fontSize: '14px', color: '#666', textAlign: 'center', marginBottom: '20px' } }, isSignup ? 'Create your account' : 'Welcome back'),
          React.createElement('div', { style: { background: '#f0f8ff', padding: '12px', borderRadius: '6px', marginBottom: '20px', fontSize: '12px', textAlign: 'center' } },
            '🔒 Secured by Appwrite (SOC 2 + HIPAA)'
          ),
          error && React.createElement('div', { style: { background: '#ffe0e0', color: '#d32f2f', padding: '12px', borderRadius: '6px', marginBottom: '15px', fontSize: '13px' } }, error),
          isSignup && React.createElement('input', { 
            type: 'text', 
            placeholder: 'Full Name', 
            value: name, 
            onChange: (e) => { setName(e.target.value); setError(''); },
            style: { width: '100%', padding: '12px', border: '2px solid #e0e0e0', borderRadius: '8px', marginBottom: '15px', fontSize: '14px', boxSizing: 'border-box' }
          }),
          React.createElement('input', { 
            type: 'email', 
            placeholder: 'Email', 
            value: email, 
            onChange: (e) => { setEmail(e.target.value); setError(''); },
            style: { width: '100%', padding: '12px', border: '2px solid #e0e0e0', borderRadius: '8px', marginBottom: '15px', fontSize: '14px', boxSizing: 'border-box' }
          }),
          React.createElement('input', { 
            type: 'password', 
            placeholder: 'Password (min 8 characters)', 
            value: password, 
            onChange: (e) => { setPassword(e.target.value); setError(''); },
            style: { width: '100%', padding: '12px', border: '2px solid #e0e0e0', borderRadius: '8px', marginBottom: '20px', fontSize: '14px', boxSizing: 'border-box' }
          }),
          React.createElement('button', { 
            onClick: () => isSignup ? onSignup(email, password, name) : onLogin(email, password),
            disabled: loading,
            style: { width: '100%', padding: '12px', background: '#667eea', color: 'white', border: 'none', borderRadius: '8px', fontSize: '16px', fontWeight: 'bold', cursor: 'pointer', marginBottom: '15px' }
          }, loading ? 'Loading...' : (isSignup ? 'Sign Up' : 'Login')),
          React.createElement('button', { 
            onClick: () => { setIsSignup(!isSignup); setError(''); },
            style: { width: '100%', padding: '12px', background: 'transparent', color: '#667eea', border: '2px solid #667eea', borderRadius: '8px', cursor: 'pointer', fontSize: '14px', fontWeight: 'bold' }
          }, isSignup ? 'Have account? Login' : 'New user? Sign Up')
        )
      );
    };

    // Dashboard Screen
    const DashboardScreen = ({ stats, projects, entries, user, onLogout, onAddEntry, onAddProject, onEditProject, onDeleteProject, onDeleteEntry, onExport }) => {
      const activeProjects = projects.filter(p => p.active);
      const monthlyChartData = Object.entries(stats.monthlyData).map(([month, data]) => ({ month, earnings: Math.round(data.earnings) }));
      const projectChartData = Object.entries(stats.projectStats).map(([name, data]) => ({ name, earnings: Math.round(data.earnings) }));

      return React.createElement('div', { style: { minHeight: '100vh', background: '#f8f9fa', paddingBottom: '100px' } },
        React.createElement('div', { style: { background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', color: 'white', padding: '30px 20px', borderRadius: '0 0 20px 20px' } },
          React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
            React.createElement('div', null,
              React.createElement('h1', { style: { fontSize: '32px', fontWeight: 'bold', margin: '0 0 5px 0' } }, 'IronWork'),
              React.createElement('p', { style: { margin: 0, fontSize: '12px', opacity: 0.9 } }, user.email)
            ),
            React.createElement('button', { onClick: onLogout, style: { background: 'rgba(255,255,255,0.2)', color: 'white', border: 'none', padding: '8px 16px', borderRadius: '6px', cursor: 'pointer', fontSize: '13px' } }, 'Logout')
          ),
          React.createElement('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '15px', marginTop: '20px' } },
            React.createElement('div', { style: { background: 'rgba(255,255,255,0.1)', padding: '15px', borderRadius: '12px' } },
              React.createElement('div', { style: { fontSize: '12px', opacity: 0.9, marginBottom: '5px' } }, 'Total Earnings'),
              React.createElement('div', { style: { fontSize: '24px', fontWeight: 'bold' } }, '₹' + Math.round(stats.totalEarnings).toLocaleString())
            ),
            React.createElement('div', { style: { background: 'rgba(255,255,255,0.1)', padding: '15px', borderRadius: '12px' } },
              React.createElement('div', { style: { fontSize: '12px', opacity: 0.9, marginBottom: '5px' } }, 'Total Hours'),
              React.createElement('div', { style: { fontSize: '24px', fontWeight: 'bold' } }, Math.round(stats.totalHours) + 'h')
            )
          )
        ),

        React.createElement('div', { style: { padding: '20px' } },
          React.createElement('div', { style: { background: 'white', padding: '20px', borderRadius: '12px', marginBottom: '20px' } },
            React.createElement('h2', { style: { fontSize: '16px', fontWeight: 'bold', margin: '0 0 15px 0' } }, 'Monthly Earnings'),
            React.createElement(ResponsiveContainer, { width: '100%', height: 300 },
              React.createElement(LineChart, { data: monthlyChartData },
                React.createElement(CartesianGrid, { strokeDasharray: '3 3' }),
                React.createElement(XAxis, { dataKey: 'month' }),
                React.createElement(YAxis, null),
                React.createElement(Tooltip, { formatter: (v) => '₹' + v }),
                React.createElement(Line, { type: 'monotone', dataKey: 'earnings', stroke: '#667eea', strokeWidth: 2 })
              )
            )
          ),

          React.createElement('div', { style: { background: 'white', padding: '20px', borderRadius: '12px', marginBottom: '20px' } },
            React.createElement('h2', { style: { fontSize: '16px', fontWeight: 'bold', margin: '0 0 15px 0' } }, 'Projects Comparison'),
            React.createElement(ResponsiveContainer, { width: '100%', height: 300 },
              React.createElement(BarChart, { data: projectChartData },
                React.createElement(CartesianGrid, { strokeDasharray: '3 3' }),
                React.createElement(XAxis, { dataKey: 'name' }),
                React.createElement(YAxis, null),
                React.createElement(Tooltip, { formatter: (v) => '₹' + v }),
                React.createElement(Bar, { dataKey: 'earnings', fill: '#667eea' })
              )
            )
          ),

          React.createElement('h2', { style: { fontSize: '18px', fontWeight: 'bold', marginBottom: '15px' } }, 'Your Projects'),
          activeProjects.length === 0 ? React.createElement('div', { style: { background: 'white', padding: '30px', borderRadius: '12px', textAlign: 'center' } },
            React.createElement('p', { style: { color: '#999', marginBottom: '15px' } }, 'No projects yet'),
            React.createElement('button', { onClick: onAddProject, style: { padding: '10px 20px', background: '#667eea', color: 'white', border: 'none', borderRadius: '6px', cursor: 'pointer' } }, 'Create Project')
          ) : React.createElement('div', { style: { display: 'grid', gap: '12px' } },
            activeProjects.map(p => {
              const pdata = stats.projectStats[p.name] || { earnings: 0, hours: 0, days: 0 };
              return React.createElement('div', { key: p.$id, style: { background: 'white', padding: '15px', borderRadius: '12px', borderLeft: '4px solid #667eea' } },
                React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '10px' } },
                  React.createElement('div', null,
                    React.createElement('h3', { style: { margin: '0 0 5px 0', fontSize: '16px', fontWeight: 'bold' } }, p.name),
                    React.createElement('p', { style: { margin: 0, fontSize: '12px', color: '#666' } }, p.paymentType === 'Per Day' ? '₹' + p.salary + '/month' : '₹' + p.rate + '/hr')
                  ),
                  React.createElement('div', { style: { textAlign: 'right' } },
                    React.createElement('div', { style: { fontSize: '18px', fontWeight: 'bold', color: '#667eea' } }, '₹' + Math.round(pdata.earnings).toLocaleString()),
                    React.createElement('div', { style: { fontSize: '12px', color: '#999' } }, p.paymentType === 'Per Day' ? pdata.days + ' days' : Math.round(pdata.hours) + 'h')
                  )
                ),
                p.paymentType === 'Hourly' && p.targetHours > 0 ? React.createElement('div', { style: { marginTop: '10px' } },
                  React.createElement('div', { style: { fontSize: '12px', color: '#666', marginBottom: '5px' } }, 'Progress: ' + Math.round(pdata.hours) + ' / ' + p.targetHours + 'h'),
                  React.createElement('div', { style: { background: '#f0f0f0', borderRadius: '4px', height: '6px', overflow: 'hidden' } },
                    React.createElement('div', { style: { background: '#667eea', height: '100%', width: Math.min((pdata.hours / p.targetHours) * 100, 100) + '%' } })
                  )
                ) : null,
                React.createElement('div', { style: { display: 'flex', gap: '8px', marginTop: '10px' } },
                  React.createElement('button', { onClick: () => onEditProject(p), style: { padding: '6px 12px', background: '#f0f0f0', border: 'none', borderRadius: '4px', cursor: 'pointer', fontSize: '12px' } }, 'Edit'),
                  React.createElement('button', { onClick: () => { if(confirm('Delete ' + p.name + '?')) onDeleteProject(p.$id); }, style: { padding: '6px 12px', background: '#ffe0e0', border: 'none', borderRadius: '4px', cursor: 'pointer', fontSize: '12px', color: '#d32f2f' } }, 'Delete')
                )
              );
            })
          ),

          React.createElement('h2', { style: { fontSize: '18px', fontWeight: 'bold', marginBottom: '15px', marginTop: '30px' } }, 'Recent Entries'),
          entries.length === 0 ? React.createElement('div', { style: { background: 'white', padding: '30px', borderRadius: '12px', textAlign: 'center' } },
            React.createElement('p', { style: { color: '#999' } }, 'No entries yet')
          ) : React.createElement('div', { style: { display: 'grid', gap: '10px' } },
            entries.slice(0, 10).map(e => {
              const p = projects.find(pr => pr.$id === e.project_id);
              return React.createElement('div', { key: e.$id, style: { background: 'white', padding: '12px', borderRadius: '8px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
                React.createElement('div', null,
                  React.createElement('div', { style: { fontWeight: 'bold', marginBottom: '3px' } }, p?.name),
                  React.createElement('div', { style: { color: '#999', fontSize: '12px' } }, e.date + ' ' + (e.isHoliday ? '(Holiday)' : e.startTime + ' - ' + e.endTime))
                ),
                React.createElement('div', { style: { textAlign: 'right' } },
                  React.createElement('div', { style: { fontWeight: 'bold', color: '#667eea' } }, '₹' + Math.round(e.earnings)),
                  e.hours > 0 ? React.createElement('div', { style: { color: '#999', fontSize: '12px' } }, Math.round(e.hours * 10) / 10 + 'h') : null
                ),
                React.createElement('button', { onClick: () => { if(confirm('Delete this entry?')) onDeleteEntry(e.$id); }, style: { background: 'none', border: 'none', color: '#d32f2f', cursor: 'pointer', fontSize: '16px' } }, '✕')
              );
            })
          )
        ),

        React.createElement('div', { style: { position: 'fixed', bottom: 0, left: 0, right: 0, background: 'white', borderTop: '1px solid #e0e0e0', display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', padding: '10px 0' } },
          React.createElement('button', { onClick: onAddEntry, style: { padding: '15px', background: '#667eea', color: 'white', border: 'none', cursor: 'pointer', fontSize: '14px', fontWeight: 'bold' } }, '➕ Entry'),
          React.createElement('button', { onClick: onAddProject, style: { padding: '15px', background: '#f0f0f0', color: '#333', border: 'none', cursor: 'pointer', fontSize: '14px', fontWeight: 'bold' } }, '➕ Project'),
          React.createElement('button', { onClick: onExport, style: { padding: '15px', background: '#f0f0f0', color: '#333', border: 'none', cursor: 'pointer', fontSize: '14px', fontWeight: 'bold' } }, '📥 Export')
        )
      );
    };

    // Add Entry Screen
    const AddEntryScreen = ({ projects, onSubmit, onBack }) => {
      const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
      const [projectId, setProjectId] = useState(projects[0]?.$id || '');
      const [startTime, setStartTime] = useState('09:00');
      const [endTime, setEndTime] = useState('17:00');
      const [isHoliday, setIsHoliday] = useState(false);

      return React.createElement('div', { style: { minHeight: '100vh', background: '#f8f9fa' } },
        React.createElement('div', { style: { background: '#667eea', color: 'white', padding: '20px', display: 'flex', alignItems: 'center', gap: '15px' } },
          React.createElement('button', { onClick: onBack, style: { background: 'none', border: 'none', color: 'white', fontSize: '24px', cursor: 'pointer' } }, '←'),
          React.createElement('h1', { style: { fontSize: '24px', fontWeight: 'bold', margin: 0 } }, 'Add Entry')
        ),
        React.createElement('div', { style: { padding: '20px' } },
          React.createElement('div', { style: { marginBottom: '20px' } },
            React.createElement('label', { style: { display: 'block', marginBottom: '8px', fontWeight: 'bold' } }, 'Project'),
            React.createElement('select', { value: projectId, onChange: (e) => setProjectId(e.target.value), style: { width: '100%', padding: '12px', border: '2px solid #e0e0e0', borderRadius: '8px', boxSizing: 'border-box' } },
              projects.filter(p => p.active).map(p => React.createElement('option', { key: p.$id, value: p.$id }, p.name))
            )
          ),
          React.createElement('div', { style: { marginBottom: '20px' } },
            React.createElement('label', { style: { display: 'block', marginBottom: '8px', fontWeight: 'bold' } }, 'Date'),
            React.createElement('input', { type: 'date', value: date, onChange: (e) => setDate(e.target.value), style: { width: '100%', padding: '12px', border: '2px solid #e0e0e0', borderRadius: '8px', boxSizing: 'border-box' } })
          ),
          React.createElement('div', { style: { marginBottom: '20px', background: 'white', padding: '15px', borderRadius: '8px' } },
            React.createElement('label', { style: { display: 'flex', alignItems: 'center', gap: '10px', cursor: 'pointer' } },
              React.createElement('input', { type: 'checkbox', checked: isHoliday, onChange: (e) => setIsHoliday(e.target.checked) }),
              React.createElement('span', { style: { fontWeight: 'bold' } }, 'Mark as Paid Holiday')
            )
          ),
          !isHoliday ? React.createElement(React.Fragment, null,
            React.createElement('div', { style: { marginBottom: '20px' } },
              React.createElement('label', { style: { display: 'block', marginBottom: '8px', fontWeight: 'bold' } }, 'Start Time'),
              React.createElement('input', { type: 'time', value: startTime, onChange: (e) => setStartTime(e.target.value), style: { width: '100%', padding: '12px', border: '2px solid #e0e0e0', borderRadius: '8px', boxSizing: 'border-box' } })
            ),
            React.createElement('div', { style: { marginBottom: '20px' } },
              React.createElement('label', { style: { display: 'block', marginBottom: '8px', fontWeight: 'bold' } }, 'End Time'),
              React.createElement('input', { type: 'time', value: endTime, onChange: (e) => setEndTime(e.target.value), style: { width: '100%', padding: '12px', border: '2px solid #e0e0e0', borderRadius: '8px', boxSizing: 'border-box' } })
            )
          ) : null,
          React.createElement('button', { onClick: () => onSubmit({ project_id: projectId, date, startTime, endTime, isHoliday }), style: { width: '100%', padding: '14px', background: '#667eea', color: 'white', border: 'none', borderRadius: '8px', fontWeight: 'bold', cursor: 'pointer' } }, 'Save Entry')
        )
      );
    };

    // Add Project Screen
    const AddProjectScreen = ({ onSubmit, onBack }) => {
      const [name, setName] = useState('');
      const [paymentType, setPaymentType] = useState('Per Day');
      const [salary, setSalary] = useState('');
      const [workingDays, setWorkingDays] = useState('30');
      const [targetHours, setTargetHours] = useState('');

      return React.createElement('div', { style: { minHeight: '100vh', background: '#f8f9fa' } },
        React.createElement('div', { style: { background: '#667eea', color: 'white', padding: '20px', display: 'flex', alignItems: 'center', gap: '15px' } },
          React.createElement('button', { onClick: onBack, style: { background: 'none', border: 'none', color: 'white', fontSize: '24px', cursor: 'pointer' } }, '←'),
          React.createElement('h1', { style: { fontSize: '24px', fontWeight: 'bold', margin: 0 } }, 'New Project')
        ),
        React.createElement('div', { style: { padding: '20px' } },
          React.createElement('div', { style: { marginBottom: '20px' } },
            React.createElement('label', { style: { display: 'block', marginBottom: '8px', fontWeight: 'bold' } }, 'Project Name'),
            React.createElement('input', { type: 'text', placeholder: 'e.g., Nelson Classes', value: name, onChange: (e) => setName(e.target.value), style: { width: '100%', padding: '12px', border: '2px solid #e0e0e0', borderRadius: '8px', boxSizing: 'border-box' } })
          ),
          React.createElement('div', { style: { marginBottom: '20px' } },
            React.createElement('label', { style: { display: 'block', marginBottom: '8px', fontWeight: 'bold' } }, 'Payment Type'),
            React.createElement('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' } },
              React.createElement('button', { onClick: () => setPaymentType('Per Day'), style: { padding: '12px', border: paymentType === 'Per Day' ? '2px solid #667eea' : '2px solid #e0e0e0', borderRadius: '8px', background: paymentType === 'Per Day' ? '#f0f0ff' : 'white', cursor: 'pointer', fontWeight: 'bold' } }, 'Per Day'),
              React.createElement('button', { onClick: () => setPaymentType('Hourly'), style: { padding: '12px', border: paymentType === 'Hourly' ? '2px solid #667eea' : '2px solid #e0e0e0', borderRadius: '8px', background: paymentType === 'Hourly' ? '#f0f0ff' : 'white', cursor: 'pointer', fontWeight: 'bold' } }, 'Hourly')
            )
          ),
          React.createElement('div', { style: { marginBottom: '20px' } },
            React.createElement('label', { style: { display: 'block', marginBottom: '8px', fontWeight: 'bold' } }, paymentType === 'Per Day' ? 'Monthly Salary (₹)' : 'Hourly Rate (₹)'),
            React.createElement('input', { type: 'number', placeholder: '0', value: salary, onChange: (e) => setSalary(e.target.value), style: { width: '100%', padding: '12px', border: '2px solid #e0e0e0', borderRadius: '8px', boxSizing: 'border-box' } })
          ),
          paymentType === 'Per Day' ? React.createElement('div', { style: { marginBottom: '20px' } },
            React.createElement('label', { style: { display: 'block', marginBottom: '8px', fontWeight: 'bold' } }, 'Working Days per Month'),
            React.createElement('input', { type: 'number', value: workingDays, onChange: (e) => setWorkingDays(e.target.value), style: { width: '100%', padding: '12px', border: '2px solid #e0e0e0', borderRadius: '8px', boxSizing: 'border-box' } })
          ) : React.createElement('div', { style: { marginBottom: '20px' } },
            React.createElement('label', { style: { display: 'block', marginBottom: '8px', fontWeight: 'bold' } }, 'Target Hours per Month'),
            React.createElement('input', { type: 'number', placeholder: 'e.g., 90', value: targetHours, onChange: (e) => setTargetHours(e.target.value), style: { width: '100%', padding: '12px', border: '2px solid #e0e0e0', borderRadius: '8px', boxSizing: 'border-box' } })
          ),
          React.createElement('button', { onClick: () => onSubmit({ name, paymentType, salary, workingDays, targetHours }), style: { width: '100%', padding: '14px', background: '#667eea', color: 'white', border: 'none', borderRadius: '8px', fontWeight: 'bold', cursor: 'pointer' } }, 'Create Project')
        )
      );
    };

    // Edit Project Screen
    const EditProjectScreen = ({ project, onSubmit, onBack }) => {
      const [name, setName] = useState(project?.name || '');
      const [salary, setSalary] = useState(project?.salary || '');
      const [workingDays, setWorkingDays] = useState(project?.workingDays || '30');
      const [targetHours, setTargetHours] = useState(project?.targetHours || '');

      return React.createElement('div', { style: { minHeight: '100vh', background: '#f8f9fa' } },
        React.createElement('div', { style: { background: '#667eea', color: 'white', padding: '20px', display: 'flex', alignItems: 'center', gap: '15px' } },
          React.createElement('button', { onClick: onBack, style: { background: 'none', border: 'none', color: 'white', fontSize: '24px', cursor: 'pointer' } }, '←'),
          React.createElement('h1', { style: { fontSize: '24px', fontWeight: 'bold', margin: 0 } }, 'Edit Project')
        ),
        React.createElement('div', { style: { padding: '20px' } },
          React.createElement('div', { style: { marginBottom: '20px' } },
            React.createElement('label', { style: { display: 'block', marginBottom: '8px', fontWeight: 'bold' } }, 'Project Name'),
            React.createElement('input', { type: 'text', value: name, onChange: (e) => setName(e.target.value), style: { width: '100%', padding: '12px', border: '2px solid #e0e0e0', borderRadius: '8px', boxSizing: 'border-box' } })
          ),
          React.createElement('div', { style: { marginBottom: '20px' } },
            React.createElement('label', { style: { display: 'block', marginBottom: '8px', fontWeight: 'bold' } }, project?.paymentType === 'Per Day' ? 'Monthly Salary (₹)' : 'Hourly Rate (₹)'),
            React.createElement('input', { type: 'number', value: salary, onChange: (e) => setSalary(e.target.value), style: { width: '100%', padding: '12px', border: '2px solid #e0e0e0', borderRadius: '8px', boxSizing: 'border-box' } })
          ),
          project?.paymentType === 'Per Day' ? React.createElement('div', { style: { marginBottom: '20px' } },
            React.createElement('label', { style: { display: 'block', marginBottom: '8px', fontWeight: 'bold' } }, 'Working Days per Month'),
            React.createElement('input', { type: 'number', value: workingDays, onChange: (e) => setWorkingDays(e.target.value), style: { width: '100%', padding: '12px', border: '2px solid #e0e0e0', borderRadius: '8px', boxSizing: 'border-box' } })
          ) : React.createElement('div', { style: { marginBottom: '20px' } },
            React.createElement('label', { style: { display: 'block', marginBottom: '8px', fontWeight: 'bold' } }, 'Target Hours per Month'),
            React.createElement('input', { type: 'number', value: targetHours, onChange: (e) => setTargetHours(e.target.value), style: { width: '100%', padding: '12px', border: '2px solid #e0e0e0', borderRadius: '8px', boxSizing: 'border-box' } })
          ),
          React.createElement('button', { onClick: () => onSubmit({ name, paymentType: project?.paymentType, salary, workingDays, targetHours }), style: { width: '100%', padding: '14px', background: '#667eea', color: 'white', border: 'none', borderRadius: '8px', fontWeight: 'bold', cursor: 'pointer' } }, 'Update Project')
        )
      );
    };

    // Export Screen
    const ExportScreen = ({ stats, entries, projects, onBack }) => {
      const exportCSV = () => {
        const headers = ['Date', 'Project', 'Start', 'End', 'Holiday', 'Hours', 'Earnings'];
        const rows = entries.map(e => {
          const p = projects.find(pr => pr.$id === e.project_id);
          return [e.date, p?.name || '', e.startTime, e.endTime, e.isHoliday ? 'Yes' : 'No', e.hours, e.earnings];
        });
        const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'ironwork-export.csv';
        a.click();
      };

      return React.createElement('div', { style: { minHeight: '100vh', background: '#f8f9fa' } },
        React.createElement('div', { style: { background: '#667eea', color: 'white', padding: '20px', display: 'flex', alignItems: 'center', gap: '15px' } },
          React.createElement('button', { onClick: onBack, style: { background: 'none', border: 'none', color: 'white', fontSize: '24px', cursor: 'pointer' } }, '←'),
          React.createElement('h1', { style: { fontSize: '24px', fontWeight: 'bold', margin: 0 } }, 'Export Data')
        ),
        React.createElement('div', { style: { padding: '20px' } },
          React.createElement('div', { style: { background: 'white', padding: '20px', borderRadius: '12px', marginBottom: '20px' } },
            React.createElement('h2', { style: { fontSize: '16px', fontWeight: 'bold', margin: '0 0 15px 0' } }, 'Summary'),
            React.createElement('p', { style: { margin: '10px 0' } }, 'Total Earnings: ₹' + Math.round(stats.totalEarnings).toLocaleString()),
            React.createElement('p', { style: { margin: '10px 0' } }, 'Total Hours: ' + Math.round(stats.totalHours) + 'h'),
            React.createElement('p', { style: { margin: '10px 0' } }, 'Total Entries: ' + entries.length)
          ),
          React.createElement('button', { onClick: exportCSV, style: { width: '100%', padding: '14px', background: '#667eea', color: 'white', border: 'none', borderRadius: '8px', fontWeight: 'bold', cursor: 'pointer', marginBottom: '15px' } }, '📥 Download CSV'),
          React.createElement('button', { onClick: onBack, style: { width: '100%', padding: '14px', background: '#f0f0f0', color: '#333', border: 'none', borderRadius: '8px', fontWeight: 'bold', cursor: 'pointer' } }, 'Back to Dashboard')
        )
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(IronworkApp));
  </script>
</body>
</html>
