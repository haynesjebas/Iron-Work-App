<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#667eea">
  <title>IronWork - Work Tracking App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #f8f9fa;
      color: #333;
      line-height: 1.6;
    }

    button {
      font-family: inherit;
    }

    input, select, textarea {
      font-family: inherit;
    }

    .container {
      width: 100%;
      min-height: 100vh;
    }

    /* Setup Screen */
    .setup-screen {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .setup-box {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .setup-box h1 {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
      text-align: center;
    }

    .setup-box p {
      font-size: 14px;
      color: #666;
      text-align: center;
      margin-bottom: 30px;
    }

    .setup-box input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      box-sizing: border-box;
    }

    .setup-box button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .setup-box button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .help-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: #667eea;
      border: 2px solid #667eea;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .help-text {
      margin-top: 30px;
      padding: 20px;
      background: #f5f5f5;
      border-radius: 8px;
      display: none;
    }

    .help-text.show {
      display: block;
    }

    .help-text p {
      font-size: 12px;
      color: #666;
      margin: 0 0 10px 0;
      text-align: left;
    }

    .help-text ol {
      font-size: 12px;
      color: #666;
      margin: 0;
      padding-left: 20px;
    }

    /* Dashboard */
    .dashboard {
      min-height: 100vh;
      background: #f8f9fa;
      padding-bottom: 80px;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px 20px;
      border-radius: 0 0 20px 20px;
    }

    .header h1 {
      font-size: 32px;
      font-weight: bold;
      margin: 0 0 20px 0;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .stat-card {
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }

    .stat-card .label {
      font-size: 12px;
      opacity: 0.9;
      margin-bottom: 5px;
    }

    .stat-card .value {
      font-size: 24px;
      font-weight: bold;
    }

    .content {
      padding: 20px;
    }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
      margin-top: 20px;
    }

    .project-list {
      display: grid;
      gap: 12px;
    }

    .project-card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      border-left: 4px solid #667eea;
    }

    .project-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 8px;
    }

    .project-name {
      font-size: 16px;
      font-weight: bold;
      margin: 0;
    }

    .project-rate {
      font-size: 12px;
      color: #666;
      margin: 0;
    }

    .project-earnings {
      font-size: 18px;
      font-weight: bold;
      color: #667eea;
    }

    .project-info {
      font-size: 12px;
      color: #999;
    }

    .progress-bar {
      background: #f0f0f0;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
      margin-top: 5px;
    }

    .progress-fill {
      background: #667eea;
      height: 100%;
      transition: width 0.3s ease;
    }

    .entries-list {
      display: grid;
      gap: 10px;
    }

    .entry-card {
      background: white;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
    }

    .entry-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .entry-left {
      flex: 1;
    }

    .entry-project {
      font-weight: bold;
      margin-bottom: 3px;
    }

    .entry-time {
      color: #999;
      font-size: 12px;
    }

    .entry-right {
      text-align: right;
    }

    .entry-earnings {
      font-weight: bold;
      color: #667eea;
    }

    .entry-hours {
      color: #999;
      font-size: 12px;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid #e0e0e0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding: 10px 0;
    }

    .nav-btn {
      padding: 15px;
      border: none;
      border-radius: 0;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }

    .nav-btn.primary {
      background: #667eea;
      color: white;
    }

    .nav-btn.secondary {
      background: #f0f0f0;
      color: #333;
    }

    /* Form Screens */
    .screen {
      min-height: 100vh;
      background: #f8f9fa;
      padding-bottom: 20px;
    }

    .screen-header {
      background: #667eea;
      color: white;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .back-btn {
      background: none;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
    }

    .screen-title {
      font-size: 24px;
      font-weight: bold;
      margin: 0;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 14px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .payment-type-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .payment-btn {
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }

    .payment-btn.active {
      border-color: #667eea;
      background: #f0f0ff;
      color: #667eea;
    }

    .checkbox-wrapper {
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .checkbox-wrapper label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      margin: 0;
    }

    .checkbox-wrapper input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .submit-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .empty-state {
      background: white;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 20px;
    }

    .empty-state p {
      color: #999;
      margin-bottom: 15px;
    }

    .create-btn {
      padding: 10px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // Simple state management
    let state = {
      screen: 'dashboard',
      apiUrl: localStorage.getItem('apiUrl') || '',
      projects: [],
      entries: [],
      loading: false,
      showHelp: false,
      formData: {
        project: '',
        date: new Date().toISOString().split('T')[0],
        startTime: '17:00',
        endTime: '20:00',
        isHoliday: false,
        name: '',
        paymentType: 'Per Day',
        salary: '',
        workingDays: '30',
        targetHours: ''
      }
    };

    const app = document.getElementById('app');

    // API Functions
    async function fetchProjects() {
      if (!state.apiUrl) return;
      try {
        const response = await fetch(`${state.apiUrl}?action=getProjects`);
        const data = await response.json();
        state.projects = data.projects || [];
        render();
      } catch (error) {
        console.error('Error loading projects:', error);
      }
    }

    async function fetchEntries() {
      if (!state.apiUrl) return;
      try {
        const response = await fetch(`${state.apiUrl}?action=getEntries`);
        const data = await response.json();
        state.entries = data.entries || [];
        render();
      } catch (error) {
        console.error('Error loading entries:', error);
      }
    }

    async function addProject(formData) {
      state.loading = true;
      render();
      try {
        await fetch(state.apiUrl, {
          method: 'POST',
          body: JSON.stringify({
            action: 'addProject',
            ...formData
          })
        });
        await fetchProjects();
        state.screen = 'dashboard';
        state.formData = { name: '', paymentType: 'Per Day', salary: '', workingDays: '30', targetHours: '' };
      } catch (error) {
        console.error('Error adding project:', error);
        alert('Error adding project');
      }
      state.loading = false;
      render();
    }

    async function addEntry(formData) {
      state.loading = true;
      render();
      try {
        await fetch(state.apiUrl, {
          method: 'POST',
          body: JSON.stringify({
            action: 'addEntry',
            ...formData
          })
        });
        await fetchEntries();
        state.screen = 'dashboard';
        state.formData = { project: state.projects[0]?.name || '', date: new Date().toISOString().split('T')[0], startTime: '17:00', endTime: '20:00', isHoliday: false };
      } catch (error) {
        console.error('Error adding entry:', error);
        alert('Error adding entry');
      }
      state.loading = false;
      render();
    }

    function setupApi(url) {
      localStorage.setItem('apiUrl', url);
      state.apiUrl = url;
      state.screen = 'dashboard';
      fetchProjects();
      fetchEntries();
      render();
    }

    function calculateStats() {
      let totalEarnings = 0;
      let totalHours = 0;
      const projectStats = {};

      state.entries.forEach(entry => {
        totalEarnings += entry.earnings || 0;
        totalHours += entry.hours || 0;

        if (!projectStats[entry.project]) {
          projectStats[entry.project] = { earnings: 0, hours: 0, days: 0 };
        }
        projectStats[entry.project].earnings += entry.earnings || 0;
        projectStats[entry.project].hours += entry.hours || 0;
        if (entry.earnings > 0) projectStats[entry.project].days += 1;
      });

      return { totalEarnings, totalHours, projectStats };
    }

    // Render functions
    function renderSetupScreen() {
      const urlInput = document.createElement('input');
      urlInput.type = 'text';
      urlInput.placeholder = 'https://script.google.com/macros/d/...';
      urlInput.id = 'api-url-input';

      const connectBtn = document.createElement('button');
      connectBtn.textContent = 'Connect';
      connectBtn.onclick = () => {
        const url = document.getElementById('api-url-input').value;
        if (url) setupApi(url);
      };

      const helpBtn = document.createElement('button');
      helpBtn.className = 'help-btn';
      helpBtn.textContent = state.showHelp ? '✕ Hide Help' : 'ℹ️ How to Setup';
      helpBtn.onclick = () => {
        state.showHelp = !state.showHelp;
        render();
      };

      const helpText = document.createElement('div');
      helpText.className = `help-text ${state.showHelp ? 'show' : ''}`;
      helpText.innerHTML = `
        <p><strong>Step 1:</strong> Create Google Sheet with "Projects" and "Entries" sheets</p>
        <p><strong>Step 2:</strong> Add Google Apps Script code (from setup guide)</p>
        <p><strong>Step 3:</strong> Deploy as Web App → copy URL</p>
        <p><strong>Step 4:</strong> Paste URL here → Connect</p>
        <p style="margin-top: 15px; font-size: 11px; color: #999;">Full guide: See SETUP_GUIDE.md</p>
      `;

      app.innerHTML = `
        <div class="setup-screen">
          <div class="setup-box">
            <h1>⚙️ Setup</h1>
            <p>Connect your Google Sheet</p>
          </div>
        </div>
      `;

      const box = app.querySelector('.setup-box');
      box.appendChild(urlInput);
      box.appendChild(connectBtn);
      box.appendChild(helpText);
      box.appendChild(helpBtn);
    }

    function renderDashboard() {
      const stats = calculateStats();
      const activeProjects = state.projects.filter(p => p.active);

      let projectsHtml = '';
      if (activeProjects.length === 0) {
        projectsHtml = `
          <div class="empty-state">
            <p>No projects yet</p>
            <button class="create-btn" onclick="state.screen='addProject';render()">Create Project</button>
          </div>
        `;
      } else {
        projectsHtml = activeProjects.map(project => {
          const projectData = stats.projectStats[project.name] || { earnings: 0, hours: 0, days: 0 };
          const progressPercent = project.targetHours ? Math.min((projectData.hours / project.targetHours) * 100, 100) : 0;
          
          return `
            <div class="project-card">
              <div class="project-header">
                <div>
                  <h3 class="project-name">${project.name}</h3>
                  <p class="project-rate">${project.paymentType === 'Per Day' ? `₹${project.salary}/month` : `₹${project.rate || Math.round(project.salary / (project.targetHours || 1))}/hr`}</p>
                </div>
                <div>
                  <div class="project-earnings">₹${Math.round(projectData.earnings).toLocaleString()}</div>
                  <div class="project-info">${project.paymentType === 'Per Day' ? projectData.days + ' days' : Math.round(projectData.hours) + 'h'}</div>
                </div>
              </div>
              ${project.paymentType === 'Hourly' && project.targetHours > 0 ? `
                <div style="margin-top: 12px;">
                  <div style="font-size: 12px; color: #666; margin-bottom: 5px;">Target: ${project.targetHours}h</div>
                  <div class="progress-bar">
                    <div class="progress-fill" style="width: ${progressPercent}%"></div>
                  </div>
                  <div style="font-size: 11px; color: #999; margin-top: 3px;">${Math.round(projectData.hours * 10) / 10} / ${project.targetHours}h</div>
                </div>
              ` : ''}
            </div>
          `;
        }).join('');
      }

      let entriesHtml = '';
      if (state.entries.length === 0) {
        entriesHtml = '<div class="empty-state"><p>No entries yet</p></div>';
      } else {
        entriesHtml = `
          <div class="entries-list">
            ${state.entries.slice(-5).reverse().map((entry, idx) => `
              <div class="entry-card">
                <div class="entry-row">
                  <div class="entry-left">
                    <div class="entry-project">${entry.project}</div>
                    <div class="entry-time">${entry.date} ${entry.isHoliday ? '(Holiday)' : entry.startTime + ' - ' + entry.endTime}</div>
                  </div>
                  <div class="entry-right">
                    <div class="entry-earnings">₹${Math.round(entry.earnings)}</div>
                    ${entry.hours > 0 ? `<div class="entry-hours">${Math.round(entry.hours * 10) / 10}h</div>` : ''}
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      }

      app.innerHTML = `
        <div class="dashboard">
          <div class="header">
            <h1>IronWork</h1>
            <div class="stats-grid">
              <div class="stat-card">
                <div class="label">Earnings</div>
                <div class="value">₹${Math.round(stats.totalEarnings).toLocaleString()}</div>
              </div>
              <div class="stat-card">
                <div class="label">Hours</div>
                <div class="value">${Math.round(stats.totalHours)}h</div>
              </div>
            </div>
          </div>

          <div class="content">
            <h2 class="section-title">Projects</h2>
            <div class="project-list">
              ${projectsHtml}
            </div>

            <h2 class="section-title">Recent Entries</h2>
            ${entriesHtml}
          </div>

          <div class="bottom-nav">
            <button class="nav-btn primary" onclick="state.screen='addEntry';render()">➕ Add Entry</button>
            <button class="nav-btn secondary" onclick="state.screen='projects';render()">⚙️ Projects</button>
          </div>
        </div>
      `;
    }

    function renderAddEntryScreen() {
      const activeProjects = state.projects.filter(p => p.active);
      
      app.innerHTML = `
        <div class="screen">
          <div class="screen-header">
            <button class="back-btn" onclick="state.screen='dashboard';render()">←</button>
            <h1 class="screen-title">Add Entry</h1>
          </div>

          <div class="content">
            <div class="form-group">
              <label>Project</label>
              <select id="project-select" onchange="state.formData.project=this.value">
                ${activeProjects.map(p => `<option value="${p.name}">${p.name}</option>`).join('')}
              </select>
            </div>

            <div class="form-group">
              <label>Date</label>
              <input type="date" id="date-input" value="${state.formData.date}" onchange="state.formData.date=this.value">
            </div>

            <div class="checkbox-wrapper">
              <label>
                <input type="checkbox" id="holiday-check" ${state.formData.isHoliday ? 'checked' : ''} onchange="state.formData.isHoliday=this.checked;render()">
                <span>Mark as Paid Holiday</span>
              </label>
            </div>

            ${!state.formData.isHoliday ? `
              <div class="form-group">
                <label>Start Time</label>
                <input type="time" id="start-time" value="${state.formData.startTime}" onchange="state.formData.startTime=this.value">
              </div>

              <div class="form-group">
                <label>End Time</label>
                <input type="time" id="end-time" value="${state.formData.endTime}" onchange="state.formData.endTime=this.value">
              </div>
            ` : ''}

            <button class="submit-btn" ${state.loading || !state.formData.project ? 'disabled' : ''} onclick="addEntry(state.formData)">
              ${state.loading ? 'Saving...' : 'Save Entry'}
            </button>
          </div>
        </div>
      `;

      if (activeProjects.length > 0) {
        document.getElementById('project-select').value = state.formData.project || activeProjects[0].name;
      }
    }

    function renderProjectsScreen() {
      const activeProjects = state.projects.filter(p => p.active);

      let projectsHtml = '';
      if (activeProjects.length === 0) {
        projectsHtml = `
          <div class="empty-state">
            <p>No projects created yet</p>
            <button class="create-btn" onclick="state.screen='addProject';render()">Create First Project</button>
          </div>
        `;
      } else {
        projectsHtml = activeProjects.map(project => {
          const rate = project.rate || (project.paymentType === 'Per Day' ? Math.round(project.salary / (project.workingDays || 30)) : Math.round(project.salary / (project.targetHours || 1)));
          return `
            <div class="project-card">
              <h3 class="project-name">${project.name}</h3>
              <p class="project-rate">Type: <strong>${project.paymentType}</strong></p>
              <p class="project-rate">${project.paymentType === 'Per Day' ? `Salary: ₹${project.salary} / ${project.workingDays || 30} days` : `Rate: ₹${rate}/hr`}</p>
              ${project.targetHours > 0 ? `<p class="project-rate">Target: ${project.targetHours}h/month</p>` : ''}
            </div>
          `;
        }).join('');
      }

      app.innerHTML = `
        <div class="screen">
          <div class="screen-header">
            <button class="back-btn" onclick="state.screen='dashboard';render()">←</button>
            <h1 class="screen-title">Projects</h1>
          </div>

          <div class="content">
            <div class="project-list">
              ${projectsHtml}
            </div>
            <button class="submit-btn" onclick="state.screen='addProject';render()">+ Add Project</button>
          </div>
        </div>
      `;
    }

    function renderAddProjectScreen() {
      app.innerHTML = `
        <div class="screen">
          <div class="screen-header">
            <button class="back-btn" onclick="state.screen='projects';render()">←</button>
            <h1 class="screen-title">New Project</h1>
          </div>

          <div class="content">
            <div class="form-group">
              <label>Project Name</label>
              <input type="text" id="name-input" placeholder="e.g., Nelson Classes" value="${state.formData.name}" onchange="state.formData.name=this.value">
            </div>

            <div class="form-group">
              <label>Payment Type</label>
              <div class="payment-type-buttons">
                <button class="payment-btn ${state.formData.paymentType === 'Per Day' ? 'active' : ''}" onclick="state.formData.paymentType='Per Day';render()">Per Day</button>
                <button class="payment-btn ${state.formData.paymentType === 'Hourly' ? 'active' : ''}" onclick="state.formData.paymentType='Hourly';render()">Hourly</button>
              </div>
            </div>

            <div class="form-group">
              <label>${state.formData.paymentType === 'Per Day' ? 'Monthly Salary (₹)' : 'Hourly Rate (₹)'}</label>
              <input type="number" id="salary-input" placeholder="0" value="${state.formData.salary}" onchange="state.formData.salary=this.value">
            </div>

            ${state.formData.paymentType === 'Per Day' ? `
              <div class="form-group">
                <label>Working Days/Month</label>
                <input type="number" id="days-input" value="${state.formData.workingDays}" onchange="state.formData.workingDays=this.value">
              </div>
            ` : `
              <div class="form-group">
                <label>Target Hours/Month (optional)</label>
                <input type="number" id="hours-input" placeholder="e.g., 90" value="${state.formData.targetHours}" onchange="state.formData.targetHours=this.value">
              </div>
            `}

            <button class="submit-btn" ${state.loading ? 'disabled' : ''} onclick="handleAddProject()">
              ${state.loading ? 'Creating...' : 'Create Project'}
            </button>
          </div>
        </div>
      `;
    }

    function handleAddProject() {
      if (!state.formData.name || !state.formData.salary) {
        alert('Please fill in project name and salary');
        return;
      }
      addProject(state.formData);
    }

    function render() {
      if (!state.apiUrl) {
        renderSetupScreen();
      } else if (state.screen === 'dashboard') {
        renderDashboard();
      } else if (state.screen === 'addEntry') {
        renderAddEntryScreen();
      } else if (state.screen === 'projects') {
        renderProjectsScreen();
      } else if (state.screen === 'addProject') {
        renderAddProjectScreen();
      }
    }

    // Initial render
    render();

    // Auto-sync entries every 5 seconds
    setInterval(() => {
      if (state.apiUrl && state.screen === 'dashboard') {
        fetchEntries();
      }
    }, 5000);
  </script>
</body>
</html>
